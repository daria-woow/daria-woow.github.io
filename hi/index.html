<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дарья — Свадебный организатор · СПб</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
–bg: #ede4d6;
–card: #faf5ee;
–rose: #c4826a;
–rose-light: #e8c5b4;
–gold: #b89a6e;
–deep: #28201a;
–muted: #8c7a72;
–tg: #2AABEE;
}

html, body {
min-height: 100%;
background: var(–bg);
}

body {
font-family: ‘Jost’, sans-serif;
display: flex;
align-items: center;
justify-content: center;
min-height: 100svh;
padding: 32px 20px;
position: relative;
overflow-x: hidden;
}

/* Ambient background blobs */
body::before {
content: ‘’;
position: fixed;
top: -120px; left: -120px;
width: 500px; height: 500px;
border-radius: 50%;
background: radial-gradient(circle, rgba(196,130,106,0.13) 0%, transparent 70%);
pointer-events: none;
z-index: 0;
}
body::after {
content: ‘’;
position: fixed;
bottom: -100px; right: -100px;
width: 420px; height: 420px;
border-radius: 50%;
background: radial-gradient(circle, rgba(184,154,110,0.1) 0%, transparent 70%);
pointer-events: none;
z-index: 0;
}

.card-wrap {
position: relative;
z-index: 1;
max-width: 400px;
width: 100%;
animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
}

.card {
background: var(–card);
border-radius: 24px;
padding: 48px 36px 40px;
width: 100%;
box-shadow:
0 2px 4px rgba(44,32,26,0.04),
0 12px 40px rgba(44,32,26,0.08),
0 0 0 1px rgba(196,130,106,0.1);
}

@keyframes fadeUp {
from { opacity: 0; transform: translateY(24px); }
to   { opacity: 1; transform: translateY(0); }
}

/* Decorative top line */
.card-wrap::before {
content: ‘’;
position: absolute;
top: 0; left: 50%; transform: translateX(-50%);
width: 60px; height: 2px;
background: linear-gradient(90deg, transparent, var(–rose), transparent);
border-radius: 0 0 2px 2px;
z-index: 3;
}

/* Avatar */
.avatar-wrap {
display: flex;
justify-content: center;
margin-bottom: 20px;
animation: fadeUp 0.7s 0.1s cubic-bezier(0.22,1,0.36,1) both;
}
.avatar-ring {
width: 96px; height: 96px;
border-radius: 50%;
padding: 3px;
background: linear-gradient(135deg, var(–rose-light), var(–gold), var(–rose));
}
.avatar-inner {
width: 100%; height: 100%;
border-radius: 50%;
background: var(–bg);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 1px;
}
.avatar-daria {
font-family: ‘Cormorant Garamond’, serif;
font-size: 26px;
font-weight: 400;
font-style: italic;
color: var(–rose);
line-height: 1;
letter-spacing: -0.5px;
}
.avatar-handle {
font-family: ‘Jost’, sans-serif;
font-size: 8.5px;
font-weight: 500;
letter-spacing: 1.5px;
text-transform: uppercase;
color: var(–gold);
line-height: 1;
}

/* Name & title */
.name {
font-family: ‘Cormorant Garamond’, serif;
font-size: 32px;
font-weight: 300;
color: var(–deep);
text-align: center;
line-height: 1.1;
margin-bottom: 6px;
animation: fadeUp 0.7s 0.15s cubic-bezier(0.22,1,0.36,1) both;
}
.name em {
font-style: italic;
color: var(–rose);
}

.title {
text-align: center;
font-size: 11px;
letter-spacing: 2.5px;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 28px;
animation: fadeUp 0.7s 0.2s cubic-bezier(0.22,1,0.36,1) both;
}

/* Divider */
.divider {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 28px;
animation: fadeUp 0.7s 0.25s cubic-bezier(0.22,1,0.36,1) both;
}
.divider-line { flex: 1; height: 1px; background: rgba(196,130,106,0.2); }
.divider-dot { font-size: 10px; color: var(–rose-light); }

/* Tagline */
.tagline {
text-align: center;
font-size: 14px;
color: var(–muted);
line-height: 1.65;
margin-bottom: 32px;
font-weight: 300;
animation: fadeUp 0.7s 0.28s cubic-bezier(0.22,1,0.36,1) both;
}
.tagline strong { color: var(–deep); font-weight: 500; }

/* Buttons */
.buttons {
display: flex;
flex-direction: column;
gap: 12px;
margin-bottom: 28px;
}

.btn {
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
padding: 16px 24px;
border-radius: 14px;
text-decoration: none;
font-size: 14px;
font-weight: 500;
letter-spacing: 0.3px;
transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
position: relative;
overflow: hidden;
}
.btn:active { transform: scale(0.97); }
.btn::after {
content: ‘’;
position: absolute;
inset: 0;
background: white;
opacity: 0;
transition: opacity 0.15s;
}
.btn:hover::after { opacity: 0.07; }

.btn-primary {
background: linear-gradient(135deg, #c4826a 0%, #b06a50 100%);
color: white;
box-shadow: 0 4px 20px rgba(196,130,106,0.35);
animation: fadeUp 0.7s 0.32s cubic-bezier(0.22,1,0.36,1) both;
}
.btn-primary:hover {
box-shadow: 0 6px 28px rgba(196,130,106,0.45);
transform: translateY(-1px);
}

.btn-tg {
background: linear-gradient(135deg, #2AABEE 0%, #1a96d4 100%);
color: white;
box-shadow: 0 4px 20px rgba(42,171,238,0.28);
animation: fadeUp 0.7s 0.38s cubic-bezier(0.22,1,0.36,1) both;
}
.btn-tg:hover {
box-shadow: 0 6px 28px rgba(42,171,238,0.38);
transform: translateY(-1px);
}

.btn-outline {
background: transparent;
color: var(–deep);
border: 1.5px solid rgba(196,130,106,0.3);
box-shadow: none;
animation: fadeUp 0.7s 0.44s cubic-bezier(0.22,1,0.36,1) both;
}
.btn-outline:hover {
border-color: var(–rose);
background: rgba(196,130,106,0.04);
transform: translateY(-1px);
}

.btn-icon {
width: 20px;
height: 20px;
flex-shrink: 0;
}

/* Stats row */
.stats {
display: flex;
justify-content: center;
gap: 0;
margin-bottom: 28px;
background: rgba(196,130,106,0.06);
border-radius: 14px;
padding: 16px 0;
animation: fadeUp 0.7s 0.5s cubic-bezier(0.22,1,0.36,1) both;
}
.stat {
flex: 1;
text-align: center;
position: relative;
}
.stat:not(:last-child)::after {
content: ‘’;
position: absolute;
right: 0; top: 15%; height: 70%;
width: 1px;
background: rgba(196,130,106,0.2);
}
.stat-val {
font-family: ‘Cormorant Garamond’, serif;
font-size: 22px;
font-weight: 400;
color: var(–rose);
line-height: 1;
margin-bottom: 4px;
}
.stat-label {
font-size: 10px;
letter-spacing: 0.5px;
color: var(–muted);
text-transform: uppercase;
}

/* Footer */
.footer {
text-align: center;
font-size: 11px;
color: var(–muted);
animation: fadeUp 0.7s 0.56s cubic-bezier(0.22,1,0.36,1) both;
}
.footer a {
color: var(–rose);
text-decoration: none;
}
.footer a:hover { text-decoration: underline; }

/* Petal decoration */
.petal {
position: fixed;
pointer-events: none;
z-index: 2;
opacity: 0.55;
font-size: 22px;
animation: drift linear infinite;
}
@keyframes drift {
0%   { transform: translateY(-40px) rotate(0deg); opacity: 0; }
10%  { opacity: 0.55; }
90%  { opacity: 0.4; }
100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}
</style>

</head>
